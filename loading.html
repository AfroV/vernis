<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vernis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .logo {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent-primary, #d4af37), var(--accent-secondary, #f5e6a3), var(--accent-primary, #d4af37));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .loader {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .loader-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, var(--accent-primary, #d4af37), transparent);
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .status {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
    }

    .corner-accent {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .corner-accent.top-left { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .corner-accent.top-right { top: 40px; right: 40px; border-left: none; border-bottom: none; }
    .corner-accent.bottom-left { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .corner-accent.bottom-right { bottom: 40px; right: 40px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="corner-accent top-left"></div>
  <div class="corner-accent top-right"></div>
  <div class="corner-accent bottom-left"></div>
  <div class="corner-accent bottom-right"></div>

  <div class="logo">Vernis</div>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="status">Initializing Gallery</div>

  <script>
    // Check if server is ready using image load (works from file://)
    function checkServer() {
      var img = new Image();
      img.onload = function() {
        // Server is ready, redirect to gallery
        window.location.href = 'http://localhost/gallery.html';
      };
      img.onerror = function() {
        // Server not ready, try again
        setTimeout(checkServer, 1000);
      };
      // Add timestamp to prevent caching
      img.src = 'http://localhost/favicon.svg?' + Date.now();
    }

    // Start checking after a brief delay
    setTimeout(checkServer, 500);
  </script>
</body>
</html>
